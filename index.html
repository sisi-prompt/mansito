<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mansito — Posts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--border:#222;
  --accent:#c8f135;--text:#f0f0f0;--muted:#555;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
header{
  padding:32px 48px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;justify-content:space-between;
  background:var(--surface);
}
.client-name{font-size:28px;font-weight:600;letter-spacing:-0.02em;}
.client-name span{color:var(--accent);}
.meta{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;padding:40px 48px;
}
.card{
  text-decoration:none;color:inherit;
  border:1px solid var(--border);border-radius:2px;
  overflow:hidden;background:var(--surface);
  transition:border-color 0.2s,transform 0.2s;
  display:block;
}
.card:hover{border-color:var(--accent);transform:translateY(-2px);}
.card-thumb{
  position:relative;height:200px;overflow:hidden;
  background:#111;
}
.card-thumb iframe{
  width:1080px;height:1350px;border:none;
  transform:scale(0.259);transform-origin:top left;
  pointer-events:none;
}
.card-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s;
  font-family:var(--mono);font-size:12px;
  color:#fff;letter-spacing:0.1em;opacity:0;
}
.card:hover .card-overlay{background:rgba(0,0,0,0.5);opacity:1;}
.card-meta{padding:14px 16px;border-top:1px solid var(--border);}
.card-cat{
  font-family:var(--mono);font-size:10px;
  letter-spacing:0.15em;text-transform:uppercase;
  color:var(--accent);margin-bottom:6px;
}
.card-title{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.3;}
.card-date{font-family:var(--mono);font-size:11px;color:var(--muted);}
.empty{
  grid-column:1/-1;text-align:center;padding:80px 20px;
  font-family:var(--mono);font-size:13px;color:var(--muted);
  letter-spacing:0.1em;
}
</style>
</head>
<body>
<!--POSTS_DATA:%5B%7B%22title%22%3A%22Mansito%3A%20Continued%20Education%22%2C%22slug%22%3A%22mansito-continued-education%22%2C%22date%22%3A%222026-03-26%22%2C%22category%22%3A%22Portrait%20Feed%20(1080%C3%971350)%22%2C%22filePath%22%3A%22posts%2Fmansito-continued-education.html%22%7D%5D:POSTS_DATA-->
<header>
  <div class="client-name">Mansito<span>.</span></div>
  <div class="meta">1 post</div>
</header>
<div class="grid">
  
    <a class="card" href="posts/mansito-continued-education.html" target="_blank">
      <div class="card-thumb">
        <iframe src="posts/mansito-continued-education.html" scrolling="no" tabindex="-1"></iframe>
        <div class="card-overlay">
          <span>Open ↗</span>
        </div>
      </div>
      <div class="card-meta">
        <div class="card-cat">Portrait Feed (1080×1350)</div>
        <div class="card-title">Mansito: Continued Education</div>
        <div class="card-date">2026-03-26</div>
      </div>
    </a>
  
</div>
</body>
</html>
